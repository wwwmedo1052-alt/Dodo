<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Together Forever ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: 'Cairo', sans-serif;
            overflow: hidden; /* لمنع السكرول مثل التطبيق */
        }

        /* الخلفية: صورة كاملة وعليها طبقة تعتيم */
        .background-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* استبدل الرابط برابط صورتكم المفضلة */
            background: url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=2070&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            filter: brightness(0.6);
            z-index: -1;
        }

        /* المحتوى الرئيسي */
        .main-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 60px 20px;
            color: white;
            text-align: center;
        }

        /* قسم الصور الدائرية (أنت وهي) */
        .couple-images {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .heart-icon {
            font-size: 30px;
            color: #ff2d55;
            animation: beat 1s infinite;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* عداد الأيام الكبير */
        .counter-section {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            padding: 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 350px;
        }

        .days-number {
            font-size: 4rem;
            font-weight: 600;
            margin: 0;
            line-height: 1;
        }

        .days-label {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* قسم التواريخ (الخطوبة والفرح) */
        .events-footer {
            width: 100%;
            max-width: 400px;
        }

        .event-item {
            background: rgba(255, 255, 255, 0.15);
            margin: 10px 0;
            padding: 15px 25px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1rem;
        }

        .event-item b { color: #ffeb3b; }

        /* القلوب المتساقطة */
        .heart-particle {
            position: fixed;
            top: -20px;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="main-container">
        <div class="top-section">
            <h2 style="margin-bottom: 20px; letter-spacing: 2px;">SARA & AHMED</h2>
            <div class="couple-images">
                <img src="https://via.placeholder.com/150" class="avatar" alt="Ahmed">
                <div class="heart-icon">❤️</div>
                <img src="https://via.placeholder.com/150" class="avatar" alt="Sara">
            </div>
        </div>

        <div class="counter-section">
            <p style="margin-bottom: 5px;">لقد مر على حبنا</p>
            <h1 class="days-number" id="days-count">0</h1>
            <p class="days-label">يوماً</p>
            <div id="clock-detail" style="font-size: 0.9rem; margin-top: 10px; opacity: 0.8;"></div>
        </div>

        <div class="events-footer">
            <div class="event-item">
                <span>💍 يوم خطوبتنا</span>
                <b>2021 / 04 / 04</b>
            </div>
            <div class="event-item">
                <span>👰 يوم فرحنا</span>
                <b>2026 / 07 / 20</b>
            </div>
        </div>
    </div>

    <script>
        // تاريخ البداية (الخطوبة أو التعارف)
        const startDate = new Date("April 4, 2021 00:00:00");

        function updateCounter() {
            const now = new Date();
            const diff = now - startDate;

            // حساب الأيام الكلية
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            // حساب الساعات والدقائق للعداد الصغير
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const secs = Math.floor((diff / 1000) % 60);

            document.getElementById('days-count').innerText = days;
            document.getElementById('clock-detail').innerText = `${hours} ساعة | ${mins} دقيقة | ${secs} ثانية`;
        }

        // تحديث العداد كل ثانية
        setInterval(updateCounter, 1000);
        updateCounter();

        // إضافة القلوب المتساقطة مثل الفيديو
        function createHearts() {
            const heart = document.createElement('div');
            heart.className = 'heart-particle';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 10 + 10) + 'px';
            heart.style.opacity = Math.random();
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            document.body.appendChild(heart);

            setTimeout(() => { heart.remove(); }, 6000);
        }
        setInterval(createHearts, 500);

    </script>
</body>
</html>
