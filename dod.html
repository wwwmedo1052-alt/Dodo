<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARA ❤️ AHMED</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #000; /* خلفية سوداء مثل الفيديو */
            color: #fff;
            font-family: 'Cairo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            justify-content: center;
            overflow: hidden;
        }

        /* القلوب المتساقطة */
        .heart {
            position: fixed;
            top: -20px;
            color: #ff2d55;
            font-size: 20px;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 1;
        }

        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }

        /* الحاوية المركزية */
        .content {
            text-align: center;
            z-index: 10;
            width: 100%;
        }

        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 5px;
            margin-bottom: 20px;
        }

        .main-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 0px #ff2d55; }
            50% { transform: scale(1.1); text-shadow: 0 0 20px #ff2d55; }
            100% { transform: scale(1); text-shadow: 0 0 0px #ff2d55; }
        }

        /* عداد الثواني الضخم الذي يتحرك بسرعة */
        .total-seconds {
            font-size: 3.5rem;
            font-weight: 700;
            color: #fff;
            margin: 10px 0;
            font-family: monospace; /* لثبات الأرقام أثناء الحركة */
        }

        .label {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 30px;
        }

        /* شبكة الوقت (أيام، ساعات، دقائق) */
        .time-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .time-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            min-width: 80px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .time-item div:first-child {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff2d55;
        }

        .time-item div:last-child {
            font-size: 0.8rem;
            color: #aaa;
        }

        /* قسم التواريخ في الأسفل */
        .footer-dates {
            position: absolute;
            bottom: 40px;
            width: 90%;
            max-width: 400px;
        }

        .date-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .date-row span { color: #888; }
        .date-row b { color: #fff; letter-spacing: 1px; }

    </style>
</head>
<body>

    <div class="content">
        <h1>SARA ❤️ AHMED</h1>
        
        <div class="main-icon">❤️</div>

        <div class="total-seconds" id="total-sec">0</div>
        <div class="label">ثانية من العشق</div>

        <div class="time-grid">
            <div class="time-item">
                <div id="days">0</div>
                <div>يوماً</div>
            </div>
            <div class="time-item">
                <div id="hours">0</div>
                <div>ساعة</div>
            </div>
            <div class="time-item">
                <div id="mins">0</div>
                <div>دقيقة</div>
            </div>
        </div>
    </div>

    <div class="footer-dates">
        <div class="date-row">
            <span>💍 يوم خطوبتنا</span>
            <b>2021 / 04 / 04</b>
        </div>
        <div class="date-row">
            <span>👰 يوم فرحنا</span>
            <b>2026 / 07 / 20</b>
        </div>
    </div>

    <script>
        // التاريخ الأساسي (تاريخ الخطوبة)
        const startDate = new Date("April 4, 2021 00:00:00").getTime();

        function update() {
            const now = new Date().getTime();
            const diff = now - startDate;

            // حساب الثواني الكلية (الرقم الضخم)
            const totalSecs = Math.floor(diff / 1000);
            document.getElementById('total-sec').innerText = totalSecs.toLocaleString();

            // حساب الأيام والساعات والدقائق
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

            document.getElementById('days').innerText = d;
            document.getElementById('hours').innerText = h;
            document.getElementById('mins').innerText = m;
        }

        // تحديث كل ثانية واحدة
        setInterval(update, 1000);
        update();

        // نظام القلوب المتساقطة
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            heart.style.opacity = Math.random();
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 300);

    </script>
</body>
</html>
