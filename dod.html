<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Together ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Cairo', sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        /* صورة الخلفية مثل الفيديو */
        .main-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* استبدل الرابط بصورتكم الشخصية */
            background: url('https://images.unsplash.com/photo-1516589174184-c68526674fd6?q=80&w=1000&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            filter: brightness(0.5); /* تعتيم الصورة لتبرز الأرقام */
            z-index: -1;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 40px 20px;
            z-index: 10;
        }

        /* الجزء العلوي (الأسماء) */
        .header h1 {
            font-weight: 200;
            font-size: 1.8rem;
            letter-spacing: 4px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .heart-icon {
            font-size: 50px;
            color: #ff2d55;
            margin: 10px 0;
            animation: beat 1.2s infinite;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* العداد الرئيسي (الثواني اللي بتجري) */
        .big-counter {
            text-align: center;
        }

        #total-seconds {
            font-size: 3.5rem;
            font-weight: 700;
            display: block;
            margin-bottom: 5px;
            font-family: 'Courier New', Courier, monospace; /* لثبات حركة الأرقام */
        }

        .sub-label {
            font-size: 1.1rem;
            font-weight: 200;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        /* شبكة الوقت (أيام - ساعات - دقائق) */
        .time-grid {
            display: flex;
            gap: 25px;
        }

        .time-box {
            text-align: center;
        }

        .time-box span {
            display: block;
            font-size: 1.8rem;
            font-weight: 600;
        }

        .time-box label {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* التواريخ في الأسفل */
        .footer-events {
            width: 100%;
            max-width: 350px;
        }

        .event-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-top: 0.5px solid rgba(255,255,255,0.2);
            font-size: 0.95rem;
        }

        .event-row span { font-weight: 200; }
        .event-row b { font-weight: 600; color: #ff2d55; }

        /* القلوب المتساقطة */
        .falling-heart {
            position: fixed; top: -20px;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 5;
        }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }

    </style>
</head>
<body>

    <div class="main-bg"></div>

    <div class="container">
        <div class="header">
            <h1>SARA ❤️ AHMED</h1>
        </div>

        <div class="heart-icon">❤️</div>

        <div class="big-counter">
            <span id="total-seconds">0</span>
            <div class="sub-label">ثانية من حبنا</div>
        </div>

        <div class="time-grid">
            <div class="time-box">
                <span id="days">0</span>
                <label>أيام</label>
            </div>
            <div class="time-box">
                <span id="hours">0</span>
                <label>ساعة</label>
            </div>
            <div class="time-box">
                <span id="mins">0</span>
                <label>دقيقة</label>
            </div>
        </div>

        <div class="footer-events">
            <div class="event-row">
                <span>💍 يوم خطوبتنا</span>
                <b>2021/04/04</b>
            </div>
            <div class="event-row">
                <span>👰 يوم فرحنا</span>
                <b>2026/07/20</b>
            </div>
        </div>
    </div>

    <script>
        // التاريخ اللي بدأتوا فيه (غيره براحتك)
        const startDate = new Date("April 4, 2021 00:00:00").getTime();

        function update() {
            const now = new Date().getTime();
            const diff = now - startDate;

            // الثواني الكلية
            const totalSecs = Math.floor(diff / 1000);
            document.getElementById('total-seconds').innerText = totalSecs.toLocaleString();

            // التفاصيل (أيام، ساعات، دقائق)
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

            document.getElementById('days').innerText = d;
            document.getElementById('hours').innerText = h;
            document.getElementById('mins').innerText = m;
        }

        // التحديث كل ثانية عشان الرقم يجري
        setInterval(update, 1000);
        update();

        // إضافة قلوب بتنزل زي الفيديو
        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'falling-heart';
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 15 + 10) + 'px';
            h.style.animationDuration = (Math.random() * 3 + 2) + 's';
            h.style.opacity = Math.random();
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }, 400);

    </script>
</body>
</html>
